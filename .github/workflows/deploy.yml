name: Production K3s Pipeline

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # ☸️ KUBERNETES PIPELINE (Dev & Prod via Local Registry & GHCR)
  # ==========================================
  build-and-deploy:
    name: Build, Push & Deploy to K3s
    # Uruchamiamy tylko na main lub dev
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
    runs-on: k3s-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        id: vars
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TAG=latest" >> $GITHUB_ENV
            echo "ENV=prod" >> $GITHUB_ENV
            echo "PUBLIC_URL=https://devops.mrozy.org" >> $GITHUB_ENV
          else
            echo "TAG=dev" >> $GITHUB_ENV
            echo "ENV=dev" >> $GITHUB_ENV
            echo "PUBLIC_URL=https://dev-devops.mrozy.org" >> $GITHUB_ENV
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/blog-devops
          LOCAL_IMAGE: localhost:5000/blog-devops
        run: |
          echo "Building image for ${{ env.ENV }} environment..."
          
          # Budujemy obraz z wieloma tagami
          if [[ "${{ env.ENV }}" == "prod" ]]; then
            docker build --build-arg PUBLIC_URL=${{ env.PUBLIC_URL }} -t $GHCR_IMAGE:latest -t $GHCR_IMAGE:${{ env.SHORT_SHA }} -t $LOCAL_IMAGE:latest -t $LOCAL_IMAGE:${{ env.SHORT_SHA }} .
            
            echo "Pushing Production images..."
            docker push $LOCAL_IMAGE:latest
            docker push $LOCAL_IMAGE:${{ env.SHORT_SHA }}
            docker push $GHCR_IMAGE:latest
            docker push $GHCR_IMAGE:${{ env.SHORT_SHA }}
          else
            docker build --build-arg PUBLIC_URL=${{ env.PUBLIC_URL }} -t $GHCR_IMAGE:dev -t $LOCAL_IMAGE:dev .
            
            echo "Pushing Dev images..."
            docker push $LOCAL_IMAGE:dev
            docker push $GHCR_IMAGE:dev
          fi

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Trigger Rollout (DevOps Magic)
        run: |
          # Wskazujemy config klastra
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          REGISTRY_IP="10.0.20.50"
          
          echo "Force-refreshing local image cache for ${{ env.TAG }}..."
          # Usuwamy lokalny tag, aby wymusić ponowne pobranie (pull) przez K3s, 
          # jeśli runner jest jednocześnie węzłem klastra.
          docker rmi "localhost:5000/blog-devops:${{ env.TAG }}" || true
          docker rmi "$REGISTRY_IP:5000/blog-devops:${{ env.TAG }}" || true

          if [[ "${{ env.ENV }}" == "prod" ]]; then
            kubectl rollout restart deployment/blog-devops-prod -n blog-prod
          else
            kubectl rollout restart deployment/blog-devops-dev -n blog
          fi

          echo "Starting Kuźnia cleanup..."
          # Lista wszystkich aliasów repozytorium do wyczyszczenia
          REPOS=(
            "localhost:5000/blog-devops" 
            "$REGISTRY_IP:5000/blog-devops"
            "ghcr.io/${{ github.repository_owner }}/blog-devops"
          )
          
          for REPO in "${REPOS[@]}"; do
            echo "Cleaning old images for: $REPO"
            # 1. Pobieramy ID obrazów dla tego repo
            # 2. Sortujemy od najnowszych (domyślnie w docker images)
            # 3. Zostawiamy 2 najnowsze unikalne obrazy, resztę usuwamy
            docker images "$REPO" --format "{{.ID}}" | uniq | tail -n +3 | xargs -r docker rmi || true
          done
          
          # Czyścimy osierocone warstwy (dangling images)
          docker image prune -f

      - name: Verify Deployment
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          echo "Waiting for rollout to finish..."
          if [[ "${{ env.ENV }}" == "prod" ]]; then
            kubectl rollout status deployment/blog-devops-prod -n blog-prod --timeout=60s
          else
            kubectl rollout status deployment/blog-devops-dev -n blog --timeout=60s
          fi
          
          echo "Current image digest on cluster:"
          kubectl get pods -n blog -l app=blog-devops-dev -o jsonpath='{.items[0].status.containerStatuses[0].imageID}'