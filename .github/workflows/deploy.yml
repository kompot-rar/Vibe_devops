name: Production K3s Pipeline

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # ☸️ KUBERNETES PIPELINE (Dev & Prod via Local Registry & GHCR)
  # ==========================================
  build-and-deploy:
    name: Build, Push & Deploy to K3s
    # Uruchamiamy tylko na main lub dev
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
    runs-on: k3s-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        id: vars
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TAG=latest" >> $GITHUB_ENV
            echo "ENV=prod" >> $GITHUB_ENV
            echo "PUBLIC_URL=https://devops.mrozy.org" >> $GITHUB_ENV
          else
            echo "TAG=dev" >> $GITHUB_ENV
            echo "ENV=dev" >> $GITHUB_ENV
            echo "PUBLIC_URL=https://dev-devops.mrozy.org" >> $GITHUB_ENV
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/blog-devops
          LOCAL_IMAGE: 10.0.20.50:5000/blog-devops
        run: |
          echo "Building image for ${{ env.ENV }} environment..."
          
          if [[ "${{ env.ENV }}" == "prod" ]]; then
            # Production: always use SHA + latest for stability and history
            docker build --build-arg PUBLIC_URL=${{ env.PUBLIC_URL }} -t $GHCR_IMAGE:latest -t $GHCR_IMAGE:${{ env.SHORT_SHA }} -t $LOCAL_IMAGE:latest -t $LOCAL_IMAGE:${{ env.SHORT_SHA }} .
            
            echo "Pushing Production images..."
            docker push $LOCAL_IMAGE:latest
            docker push $LOCAL_IMAGE:${{ env.SHORT_SHA }}
            docker push $GHCR_IMAGE:latest
            docker push $GHCR_IMAGE:${{ env.SHORT_SHA }}
          else
            # Dev: now using SHA to force ArgoCD/K3s image pull and bypass cache
            docker build --build-arg PUBLIC_URL=${{ env.PUBLIC_URL }} -t $GHCR_IMAGE:dev -t $GHCR_IMAGE:${{ env.SHORT_SHA }} -t $LOCAL_IMAGE:dev -t $LOCAL_IMAGE:${{ env.SHORT_SHA }} .
            
            echo "Pushing Dev images..."
            docker push $LOCAL_IMAGE:dev
            docker push $LOCAL_IMAGE:${{ env.SHORT_SHA }}
            docker push $GHCR_IMAGE:dev
            docker push $GHCR_IMAGE:${{ env.SHORT_SHA }}
          fi

      - name: Update GitOps Manifests
        run: |
          # Configure Git for the runner
          git config --global user.name "Vibe-DevOps CI"
          git config --global user.email "ci@mrozy.org"
          git config --global --add safe.directory /home/kompot/projekty/kubernetes
          
          if [[ "${{ env.ENV }}" == "prod" ]]; then
            MANIFEST_PATH="/home/kompot/projekty/kubernetes/manifests/blog-prod/deployment.yaml"
            echo "Updating Prod manifest: $MANIFEST_PATH"
            sed -i "s|image: 10.0.20.50:5000/blog-devops:.*|image: 10.0.20.50:5000/blog-devops:${{ env.SHORT_SHA }}|g" $MANIFEST_PATH
            
            cd /home/kompot/projekty/kubernetes
            git add manifests/blog-prod/deployment.yaml
            git commit -m "chore(prod): release blog-devops ${{ env.SHORT_SHA }}"
          else
            MANIFEST_PATH="/home/kompot/projekty/kubernetes/manifests/blog-dev/deployment.yaml"
            echo "Updating Dev manifest: $MANIFEST_PATH"
            sed -i "s|image: 10.0.20.50:5000/blog-devops:.*|image: 10.0.20.50:5000/blog-devops:${{ env.SHORT_SHA }}|g" $MANIFEST_PATH
            
            cd /home/kompot/projekty/kubernetes
            git add manifests/blog-dev/deployment.yaml
            git commit -m "chore(dev): update blog-devops image to ${{ env.SHORT_SHA }}"
          fi
          
          # Push changes to local kubernetes repo (ArgoCD will pick it up)
          git push origin master

      - name: Cleanup
        run: |
          docker image prune -f